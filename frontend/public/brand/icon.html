<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jogga Store — Icône</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 512px;
      height: 512px;
      background: #080f1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon {
      width: 480px;
      height: 480px;
      border-radius: 108px;
      background: linear-gradient(145deg, #0F172A 0%, #0c1e4a 55%, #1E3A8A 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(59,130,246,0.12),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* Glow top-right */
    .glow-tr {
      position: absolute;
      width: 280px;
      height: 280px;
      top: -80px;
      right: -80px;
      background: radial-gradient(circle, rgba(59,130,246,0.25) 0%, transparent 68%);
      pointer-events: none;
    }
    /* Glow bottom-left */
    .glow-bl {
      position: absolute;
      width: 220px;
      height: 220px;
      bottom: -60px;
      left: -60px;
      background: radial-gradient(circle, rgba(14,165,233,0.18) 0%, transparent 68%);
      pointer-events: none;
    }

    /* Cercles concentriques décoratifs */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(59,130,246,0.10);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .ring-1 { width: 320px; height: 320px; }
    .ring-2 { width: 430px; height: 430px; border-color: rgba(59,130,246,0.05); }

    /* Ligne diagonale accent */
    .slash {
      position: absolute;
      width: 3px;
      height: 420px;
      background: linear-gradient(180deg, transparent 0%, rgba(59,130,246,0.18) 40%, rgba(14,165,233,0.10) 70%, transparent 100%);
      top: 50%;
      left: 38%;
      transform: translate(-50%, -50%) rotate(-20deg);
      pointer-events: none;
    }

    /* Lettre J */
    .letter {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 900;
      font-size: 310px;
      line-height: 0.88;
      color: #ffffff;
      position: relative;
      z-index: 2;
      letter-spacing: -8px;
      text-shadow:
        0 0 80px rgba(59,130,246,0.4),
        0 4px 24px rgba(0,0,0,0.5);
    }

    /* Séparateur */
    .sep {
      width: 56px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #3B82F6, #0EA5E9, transparent);
      position: relative;
      z-index: 2;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    /* STORE */
    .store {
      font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif;
      font-size: 54px;
      font-weight: 400;
      letter-spacing: 20px;
      color: #60A5FA;
      position: relative;
      z-index: 2;
      margin-left: 20px; /* correction optique du tracking */
    }
  </style>
</head>
<body>
  <div class="icon">
    <div class="glow-tr"></div>
    <div class="glow-bl"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="slash"></div>
    <div class="letter">J</div>
    <div class="sep"></div>
    <div class="store">STORE</div>
  </div>
</body>
</html>
