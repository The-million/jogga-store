<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jogga Store — Icône</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 512px;
      height: 512px;
      background: #080f1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon {
      width: 480px;
      height: 480px;
      border-radius: 108px;
      background: linear-gradient(145deg, #0F172A 0%, #0c1e4a 55%, #1E3A8A 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      box-shadow:
        0 0 0 1px rgba(59,130,246,0.12),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* Glow top-right */
    .glow-tr {
      position: absolute;
      width: 300px;
      height: 300px;
      top: -90px;
      right: -90px;
      background: radial-gradient(circle, rgba(59,130,246,0.28) 0%, transparent 68%);
      pointer-events: none;
    }
    /* Glow bottom-left */
    .glow-bl {
      position: absolute;
      width: 240px;
      height: 240px;
      bottom: -70px;
      left: -70px;
      background: radial-gradient(circle, rgba(14,165,233,0.20) 0%, transparent 68%);
      pointer-events: none;
    }

    /* Cercles concentriques */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(59,130,246,0.10);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .ring-1 { width: 340px; height: 340px; }
    .ring-2 { width: 460px; height: 460px; border-color: rgba(59,130,246,0.05); }

    /* Ligne diagonale subtile */
    .slash {
      position: absolute;
      width: 2px;
      height: 460px;
      background: linear-gradient(180deg, transparent 0%, rgba(59,130,246,0.15) 40%, rgba(14,165,233,0.08) 70%, transparent 100%);
      top: 50%;
      left: 42%;
      transform: translate(-50%, -50%) rotate(-15deg);
      pointer-events: none;
    }

    /* JGG */
    .monogram {
      font-family: 'Montserrat', 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: 148px;
      line-height: 1;
      color: #ffffff;
      position: relative;
      z-index: 2;
      letter-spacing: -4px;
      text-shadow:
        0 0 60px rgba(59,130,246,0.45),
        0 2px 20px rgba(0,0,0,0.6);
    }

    /* Séparateur fin sous JGG */
    .sep {
      width: 120px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #38BDF8, transparent);
      position: relative;
      z-index: 2;
      margin-top: 16px;
      margin-bottom: 14px;
    }

    /* STORE */
    .store {
      font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif;
      font-size: 46px;
      font-weight: 400;
      letter-spacing: 14px;
      color: #38BDF8;
      position: relative;
      z-index: 2;
      margin-left: 14px; /* correction optique du tracking */
    }
  </style>
</head>
<body>
  <div class="icon">
    <div class="glow-tr"></div>
    <div class="glow-bl"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="slash"></div>
    <div class="monogram">JGG</div>
    <div class="sep"></div>
    <div class="store">STORE</div>
  </div>
</body>
</html>
